<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti</title>
    <style>
        body {
            background-color: #fff9c4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            cursor: pointer;
        }

        .flower-container {
            position: relative;
            height: 300px;
            width: 200px;
            margin: 0 auto;
            transition: transform 0.5s ease;
        }

        .flower-container:hover {
            transform: scale(1.1);
        }

        /* Tallo */
        .stem {
            width: 8px;
            height: 150px;
            background-color: #4caf50;
            margin: 0 auto;
            position: absolute;
            bottom: 50px;
            left: 96px;
            border-radius: 4px;
        }

        /* Pétalos */
        .petal {
            width: 50px;
            height: 80px;
            background-color: #ffeb3b;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            left: 75px;
            border: 2px solid #fdd835;
            transform-origin: bottom center;
        }

        .p1 { transform: rotate(0deg); }
        .p2 { transform: rotate(45deg); }
        .p3 { transform: rotate(90deg); }
        .p4 { transform: rotate(135deg); }
        .p5 { transform: rotate(180deg); }
        .p6 { transform: rotate(225deg); }
        .p7 { transform: rotate(270deg); }
        .p8 { transform: rotate(315deg); }

        /* Centro de la flor */
        .center {
            width: 60px;
            height: 60px;
            background-color: #fbc02d;
            border-radius: 50%;
            position: absolute;
            top: 65px;
            left: 70px;
            z-index: 10;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #f9a825;
            margin-top: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .mensaje {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: none;
            margin-top: 20px;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" onclick="mostrarMensaje()">
        <div class="flower-container">
            <div class="stem"></div>
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>
            <div class="petal p8"></div>
            <div class="center"></div>
        </div>
        
        <h1>¡Haz clic en la flor!</h1>

        <div id="mensaje" class="mensaje">
            <h2>Hola</h2>
            <p>¡Feliz día!</p>
            <p><strong>🌻🌻🌻🌻🌻</strong></p>
        </div>
    </div>

    <script>
        function mostrarMensaje() {
            const mensaje = document.getElementById('mensaje');
            mensaje.style.display = 'block';
            document.querySelector('h1').innerText = "Para ti con cariño";
        }
    </script>
</body>
</html>
